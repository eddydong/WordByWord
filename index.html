<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word By Word — Dictation Training</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <h1>Word By Word</h1>
  </div>
  <div class="selector-group">
    <button class="btn mp-trigger" id="btnMaterials" title="Material Center"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span id="btnMaterialsCtx">Materials</span></button>
    <button class="btn" id="btnToggleTranscript" title="Show/Hide Transcript"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 12s4-9 10-9 10 9 10 9-4 9-10 9-10-9-10-9z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg></button>
    <select id="voiceSelect">
      <option value="lady">Lady</option>
      <option value="man" selected>Man</option>
    </select>
    <select id="dictModeSelect" title="Dictation mode" autocomplete="off">
      <option value="free" selected>Exercising</option>
      <option value="programmed">Test Taking</option>
    </select>
    <select id="programmedLaps" title="Times per sentence">
      <option value="1">1x</option>
      <option value="3" selected>3x</option>
      <option value="5">5x</option>
    </select>
    <select id="speedSelect" title="Playback speed">
      <option value="slow">Slow</option>
      <option value="normal" selected>Normal</option>
      <option value="fast">Fast</option>
    </select>
    <div class="font-settings">
      <button class="font-btn" id="fontBtn" title="Font settings">Aa</button>
      <div class="font-popover" id="fontPopover">
        <label>Font Size</label>
        <div class="font-size-controls">
          <button id="fontSizeDown">−</button>
          <div class="font-size-label" id="fontSizeLabel">M</div>
          <button id="fontSizeUp">+</button>
        </div>
        <label>Font Family</label>
        <div class="font-family-options" id="fontFamilyOptions">
          <button data-font="rounded">Rounded</button>
          <button data-font="sans">Sans Serif</button>
          <button data-font="serif">Serif</button>
          <button data-font="dyslexic">OpenDyslexic</button>
        </div>
      </div>
    </div>
  </div>
</header>

<div id="main-area">
  <!-- Top panel: transcript -->
  <div id="top-panel" class="transcript-blurred">
    <div class="exercise-badge" id="exerciseBadge"></div>
    <h2 id="exerciseTitle"></h2>
    <div id="transcriptText"></div>
  </div>

  <!-- Controls + splitter bar -->
  <div id="controls-bar">
    <div class="progress-wrap" id="progressBar">
      <div id="progressSegments"></div>
      <div class="progress-fill" id="progressFill" style="left:0%;width:0%"></div>
      <div class="progress-thumb" id="progressThumb" style="left:0%"></div>
      <span class="laps-left" id="lapsLeft"></span>
    </div>
    <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
    <button class="btn icon-only" id="btnPrev" title="Previous sentence"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 4v16l-12-8 12-8z" fill="currentColor"/><rect x="4" y="4" width="3" height="16" rx="1" fill="currentColor"/></svg></button>
    <button class="btn icon-only" id="btnRew" title="Rewind (hold)"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M13 19V5l-10 7 10 7z" fill="currentColor"/><path d="M24 19V5l-10 7 10 7z" fill="currentColor"/></svg></button>
    <button class="btn primary" id="btnPlay"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M7 4v16l14-8z" fill="currentColor"/></svg> Play</button>
    <button class="btn icon-only" id="btnFwd" title="Forward (hold)"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M11 5v14l10-7-10-7z" fill="currentColor"/><path d="M0 5v14l10-7-10-7z" fill="currentColor"/></svg></button>
    <button class="btn icon-only" id="btnNext" title="Next sentence"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 4v16l12-8-12-8z" fill="currentColor"/><rect x="17" y="4" width="3" height="16" rx="1" fill="currentColor"/></svg></button>
    <button class="btn icon-only" id="btnRepeat" title="Repeat current sentence"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 12a6 6 0 0 1 6-6h5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/><polyline points="19,4 17,6 19,8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 12a6 6 0 0 1-6 6H7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/><polyline points="5,20 7,18 5,16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span class="controls-spacer"></span>
    <button class="btn" id="btnToggleInput" title="Show/Hide typing area"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M12 20h9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg> Type Here</button>
  </div>

  <!-- Bottom panel: dictation -->
  <div id="bottom-panel">
    <div class="input-caption">
      <h3>Type what you hear</h3>
      <button class="btn primary" id="btnCheck"><svg width="15" height="15" viewBox="0 0 24 24"><polyline points="5,12 10,18 19,7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg> Check</button>
      <button class="btn" id="btnClearInput"><svg width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Clear</button>
    </div>
    <div class="textarea-wrap">
      <textarea id="dictationInput" placeholder="Listen and type the words you hear..."></textarea>
    </div>
    <div class="score-display" id="scoreDisplay">
      <button class="score-close" id="scoreClose" title="Close"><svg width="14" height="14" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
      <div class="score-summary">
        <div class="score-circle" id="scoreCircle">0%</div>
        <div>
          <strong class="score-label" id="scoreLabel">Accuracy</strong>
          <div class="score-detail" id="scoreDetail"></div>
        </div>
      </div>
      <div class="diff-output" id="diffOutput"></div>
    </div>
  </div>
</div>

  <script type="module" src="/src/main.js"></script>

<div id="mp-overlay" class="mp-overlay"></div>
<aside id="mp-panel" class="mp-panel" aria-label="Material Center">
  <div class="mp-head">
    <span class="mp-title">Material Center</span>
    <button class="mp-close" id="mpClose" aria-label="Close panel"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="mp-lang-bar" id="mpLangBar"></div>
  <div class="mp-level-bar" id="mpLevelBar"></div>
  <div class="mp-tree" id="mpTree" role="tree" aria-label="Exercise tree"></div>
</aside>

</body>
</html>
